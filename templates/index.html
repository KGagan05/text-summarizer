<!DOCTYPE html>
<html>

<head>
    <title>AI Text Summarizer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #4a4a4a;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
        }

        .label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .summary-text {
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🧠 AI Text Summarizer</h1>

        <form action="/summarize" method="post">
            <textarea name="text" placeholder="Paste your text here..." required></textarea>
            <button type="submit">✨ Generate Summary</button>
        </form>

        {% if summary %}
        <div class="result">
            <div class="label">📌 Summary:</div>
            <div class="summary-text">{{summary}}</div>
        </div>
        {% endif %}

    </div>

</body>

</html>
