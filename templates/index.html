<!DOCTYPE html>
<html>

<head>
    <title>AI Text Summarizer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.3s;
        }

        /* LIGHT MODE */
        body.light {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        /* DARK MODE */
        body.dark {
            background: #121212;
            color: #f1f1f1;
        }

        .container {
            padding: 30px;
            border-radius: 15px;
            width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .light .container {
            background: white;
        }

        .dark .container {
            background: #1e1e1e;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
        }

        .dark textarea {
            background: #2c2c2c;
            color: white;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            background: #444;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        .light .result {
            background: #f4f4f4;
        }

        .dark .result {
            background: #2c2c2c;
        }
    </style>
</head>

<body class="light">

    <button class="toggle-btn" onclick="toggleMode()">🌙 Dark Mode</button>

    <div class="container">

        <h1>🧠 AI Text Summarizer</h1>

        <form action="/summarize" method="post">
            <textarea name="text" placeholder="Paste your text here..." required></textarea>
            <button type="submit">✨ Generate Summary</button>
        </form>

        {% if summary %}
        <div class="result">
            <b>📌 Summary:</b>
            <p>{{summary}}</p>
        </div>
        {% endif %}

    </div>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector(".toggle-btn");

            if (body.classList.contains("light")) {
                body.classList.remove("light");
                body.classList.add("dark");
                btn.innerText = "☀️ Light Mode";
            } else {
                body.classList.remove("dark");
                body.classList.add("light");
                btn.innerText = "🌙 Dark Mode";
            }
        }
        // Load saved mode
        if (localStorage.getItem("mode") === "dark") {
            document.body.classList.remove("light");
            document.body.classList.add("dark");
        }

        // Save mode
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector(".toggle-btn");

            if (body.classList.contains("light")) {
                body.classList.replace("light", "dark");
                btn.innerText = "☀️ Light Mode";
                localStorage.setItem("mode", "dark");
            } else {
                body.classList.replace("dark", "light");
                btn.innerText = "🌙 Dark Mode";
                localStorage.setItem("mode", "light");
            }
        }
    </script>

</body>

</html>
