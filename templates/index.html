<!DOCTYPE html>
<html>

<head>
    <title>AI Text Summarizer</title>
</head>

<body>

    <h1>🧠 AI Text Summarizer</h1>

    <form action="/summarize" method="post">
        <textarea name="text" rows="10" cols="60" placeholder="Paste your text here..." required></textarea><br><br>
        <button type="submit">Summarize</button>
    </form>

    {% if summary %}
    <h2>Summary:</h2>
    <p>{{summary}}</p>
    {% endif %}

</body>

</html>
